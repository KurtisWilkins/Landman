# Alembic configuration. Migrations live at the repo root (monorepo layout); the model
# metadata is imported from the installed `rjacq` package (apps/api).
[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os
# DB URL is supplied at runtime from settings (see migrations/env.py); this is a placeholder.
sqlalchemy.url = postgresql+psycopg://rj:rj@localhost:5432/rjacq

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
