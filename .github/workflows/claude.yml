name: Claude Code

# Interactive assistant: runs when someone mentions @claude in an issue or PR.
# v1 auto-detects interactive vs. automation mode; do not set a `mode` input.
# Set ANTHROPIC_API_KEY in repo secrets (Settings → Secrets and variables → Actions),
# or run `/install-github-app` from the Claude Code terminal to set this up automatically.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

# Least privilege: only what the action needs to read context and open PRs.
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

# Avoid piling up runs on the same thread.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  claude:
    # Only fire on an explicit @claude mention.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # No `prompt` needed for @claude mentions — the action responds to the trigger.
          # CLAUDE.md is read automatically for project standards.
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 15
