name: CI

# Lint + test on every PR and on pushes to main. Required green before merge
# (branch protection; no auto-merge — see CONTRIBUTING.md).
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rj
          POSTGRES_PASSWORD: rj
          POSTGRES_DB: rjacq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rj -d rjacq_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://rj:rj@localhost:5432/rjacq_test
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv venv --python 3.12 .venv
      - name: Install dependencies
        run: uv pip install --python .venv/bin/python -e "apps/api[dev]"
      - name: Ruff (lint + format check)
        working-directory: apps/api
        run: |
          ../../.venv/bin/ruff check rjacq tests
          ../../.venv/bin/ruff format --check rjacq tests
      - name: Mypy
        working-directory: apps/api
        run: ../../.venv/bin/mypy rjacq
      - name: Verify OpenAPI contract is in sync
        run: |
          .venv/bin/python -m rjacq.openapi /tmp/openapi.json
          diff -u apps/web/openapi.json /tmp/openapi.json \
            || (echo "::error::openapi.json is stale — run 'make gen-types'"; exit 1)
      - name: Pytest
        working-directory: apps/api
        run: ../../.venv/bin/pytest

  web:
    name: Web — lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile
      - name: Verify generated types are in sync
        working-directory: apps/web
        run: |
          pnpm gen:types
          git diff --exit-code src/api/types.ts \
            || (echo "::error::src/api/types.ts is stale — run 'make gen-types'"; exit 1)
      - name: Lint + typecheck
        working-directory: apps/web
        run: pnpm lint && pnpm typecheck
      - name: Vitest
        working-directory: apps/web
        run: pnpm test
